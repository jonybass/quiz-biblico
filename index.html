let pontos = localStorage.getItem("pontos") || 0;

    mostrarMenu();
}

function salvarUsuario() {
    let nomeInput = document.getElementById("nome").value.trim();

    if (nomeInput === "") {
        alert("Digite seu nome!");
        return;
    }

    usuario = nomeInput;
    localStorage.setItem("usuario", usuario);
    localStorage.setItem("pontos", 0);
    pontos = 0;
    mostrarMenu();
}

function mostrarMenu() {
    document.getElementById("login").classList.add("hidden");
    document.getElementById("menu").classList.remove("hidden");

// ================= QUIZ =================

let perguntasAtuais = [];
let indice = 0;
let acertos = 0;


function iniciarNivel(nivel) {
    nivelAtual = nivel;

    let lista = perguntas[nivel];

    perguntasAtuais = lista
        .sort(() => 0.5 - Math.random())
        .slice(0,20)
        .map(p => embaralharRespostas({...p}));

    indice = 0;
    acertos = 0;

    document.getElementById("menu").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");

    mostrarPergunta();
}

function resetarPontos() {

    let confirmar = confirm("Tem certeza que deseja zerar a pontuação?");

    if (confirmar) {
        localStorage.setItem("pontos", 0);
        pontos = 0;
        document.getElementById("pontos").innerText = pontos;
    }
}
function mostrarPergunta() {

    if (indice >= perguntasAtuais.length) {
        finalizar();
        return;
    }

    let p = perguntasAtuais[indice];

    document.getElementById("nivelTitulo").innerText = "Nível " + nivelAtual;
    document.getElementById("pergunta").innerText = p.q;

    let div = document.getElementById("respostas");
    div.innerHTML = "";

    p.a.forEach((resposta, i) => {
        let btn = document.createElement("button");
        btn.innerText = resposta;
        btn.onclick = () => responder(i);
        div.appendChild(btn);
    });
}

function embaralharRespostas(pergunta) {

    let respostas = pergunta.a.map((texto, index) => {
        return {texto: texto, correta: index === pergunta.c};
    });

    // embaralhar
    respostas.sort(() => Math.random() - 0.5);

    // reconstruir array
    pergunta.a = respostas.map(r => r.texto);

    // atualizar índice correto
    pergunta.c = respostas.findIndex(r => r.correta);

    return pergunta;
}

function responder(i) {

    let correta = perguntasAtuais[indice].c;

    if (i === correta) {
        acertos++;
        alert("✅ Acertou!");
    } else {
        alert("❌ Errou!");
    }

    indice++;
    mostrarPergunta();
}

function voltarMenu() {

    let confirmar = confirm("Deseja sair do quiz?");

    if (confirmar) {
        pontos = parseInt(pontos) + acertos;
        localStorage.setItem("pontos", pontos);

        indice = 0;
        acertos = 0;

        document.getElementById("quiz").classList.add("hidden");
        document.getElementById("menu").classList.remove("hidden");
        document.getElementById("pontos").innerText = pontos;
    }
}

function finalizar() {

    pontos = parseInt(pontos) + acertos;
    localStorage.setItem("pontos", pontos);

    document.getElementById("quiz").innerHTML = `
        <h2>Resultado</h2>
        <p>Você acertou <strong>${acertos}</strong> de 20 perguntas</p>
        <button onclick="proximoNivel()">Próximo nível</button>
        <button onclick="voltarMenu()">Voltar ao menu</button>
    `;
}
function proximoNivel() {
    if (nivelAtual < 4) {
        iniciarNivel(nivelAtual + 1);
    } else {
        alert("Parabéns! Você terminou todos os níveis!");

        document.getElementById("quiz").classList.add("hidden");
        document.getElementById("menu").classList.remove("hidden");

        document.getElementById("pontos").innerText = pontos;
    }
}
